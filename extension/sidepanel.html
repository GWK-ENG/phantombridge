<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantomBridge</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <!-- ========== 顶部品牌区 ========== -->
    <header class="brand-header" id="brandHeader">
        <h1 class="greeting" id="greeting">Hi，今天想控制什么？</h1>
        <!-- CLI 选择器 -->
        <div class="cli-selector" id="cliSelector">
            <!-- CLI 工具按钮由 JS 动态填充 -->
            <span class="cli-loading" id="cliLoading">🔍 正在检测本地 AI 工具...</span>
        </div>
    </header>

    <!-- ========== 聊天消息区 ========== -->
    <main class="chat-area" id="chatArea">
        <!-- 欢迎卡片 -->
        <div class="welcome-card" id="welcomeCard">
            <div class="welcome-icon">🌌</div>
            <h2>PhantomBridge 助手</h2>
            <p>我可以帮你控制浏览器、提取页面内容、执行点击和输入操作。</p>
            <div class="quick-actions">
                <button class="quick-btn" data-cmd="/tab">📋 当前标签页</button>
                <button class="quick-btn" data-cmd="/screenshot">📸 页面截图</button>
                <button class="quick-btn" data-cmd="/elements">🔍 扫描元素</button>
                <button class="quick-btn" data-cmd="/console">📝 Console 日志</button>
                <button class="quick-btn" data-cmd="/tabs">📑 所有标签页</button>
                <button class="quick-btn" data-cmd="/network">🌐 网络请求</button>
            </div>
        </div>
        <!-- 消息在此动态插入 -->
    </main>

    <!-- ========== 底部输入区 ========== -->
    <footer class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" class="message-input" placeholder="输入消息或命令（/help 查看帮助）..." rows="1"
                autocomplete="off"></textarea>
        </div>
        <div class="input-footer">
            <button class="attach-btn" id="attachBtn" title="附加选项">
                <span>＋</span>
            </button>
            <button class="settings-btn" id="settingsBtn" title="安全设置">⚙️</button>
            <div class="model-selector" id="modelSelector">
                <button class="model-btn" id="modelBtn">
                    <span class="model-name">PhantomBridge</span>
                    <span class="model-arrow">▾</span>
                </button>
                <div class="model-dropdown" id="modelDropdown">
                    <div class="model-option active" data-model="phantom">
                        <span class="model-dot"></span>
                        PhantomBridge CLI
                    </div>
                    <div class="model-option" data-model="raw">
                        <span class="model-dot"></span>
                        Raw CDP 模式
                    </div>
                </div>
            </div>
            <button class="send-btn" id="sendBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M14 8L2 14L4.5 8L2 2L14 8Z" fill="currentColor" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- ========== 状态栏 ========== -->
    <div class="status-bar" id="statusBar">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">正在连接...</span>
    </div>

    <!-- ========== 安全功能组件 ========== -->
    <div class="settings-overlay" id="settingsPanel" style="display:none;">
        <div class="settings-container">
            <div class="settings-header">
                <h2>⚙️ 安全设置</h2>
                <button class="settings-close-btn" id="settingsCloseBtn">✕</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <h3>站点权限控制</h3>
                    <div class="settings-row">
                        <label>启用站点权限</label>
                        <input type="checkbox" id="permEnabled" checked>
                    </div>
                    <div class="settings-row">
                        <label>模式</label>
                        <select id="permMode">
                            <option value="blocklist">黑名单 — 阻止指定站点</option>
                            <option value="allowlist">白名单 — 仅允许指定站点</option>
                        </select>
                    </div>
                    <div class="settings-row" id="blocklistSection">
                        <label>黑名单</label>
                        <div class="pattern-list" id="blocklistItems"></div>
                        <div class="pattern-add">
                            <input type="text" id="blocklistInput" placeholder="输入 URL 模式，如 bank.com">
                            <button id="blocklistAddBtn">添加</button>
                        </div>
                    </div>
                    <div class="settings-row" id="allowlistSection" style="display:none;">
                        <label>白名单</label>
                        <div class="pattern-list" id="allowlistItems"></div>
                        <div class="pattern-add">
                            <input type="text" id="allowlistInput" placeholder="输入 URL 模式，如 example.com">
                            <button id="allowlistAddBtn">添加</button>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>安全防护</h3>
                    <div class="settings-row">
                        <label>高风险操作确认</label>
                        <input type="checkbox" id="highRiskConfirm" checked>
                    </div>
                    <div class="settings-row">
                        <label>CAPTCHA 检测</label>
                        <input type="checkbox" id="captchaDetect" checked>
                    </div>
                    <div class="settings-row">
                        <label>提示注入防护</label>
                        <input type="checkbox" id="promptInjectionGuard" checked>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay" style="display:none;">
        <div class="confirm-dialog">
            <div class="confirm-header">⚠️ 高风险操作确认</div>
            <div class="confirm-body" id="confirmBody"></div>
            <div class="confirm-actions">
                <button class="confirm-btn deny" id="confirmDenyBtn">取消</button>
                <button class="confirm-btn allow" id="confirmAllowBtn">确认执行</button>
            </div>
        </div>
    </div>

    <div class="captcha-warning" id="captchaWarning" style="display:none;">
        🛡️ 检测到 CAPTCHA，自动化已暂停
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
